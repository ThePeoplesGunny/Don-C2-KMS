// ═══════════════════════════════════════════════════════

// not individual commands. Multiple commands per installation.

// Group nodes by physical location (rounded lat/lon to ~1km precision)
function locationKey(node) {
  return (Math.round(node.lat * 100) / 100) + "," + (Math.round(node.lon * 100) / 100);
}

// Installation names — keyed by location
const INSTALL_NAMES = {
  "38.87,-77.06": "The Pentagon",
  "38.87,-77": "Washington Navy Yard",
  "38.28,-76.41": "NAS Patuxent River",
  "38.29,-76.42": "NAS Patuxent River",
  "38.29,-76.41": "NAS Patuxent River",
  "38.29,-76.42": "NAS Patuxent River",
  "38.27,-76.41": "NAS Patuxent River",
  "36.95,-76.31": "NS Norfolk",
  "36.82,-76.03": "NAS Oceana",
  "34.9,-76.88": "MCAS Cherry Point",
  "30.23,-81.68": "NAS Jacksonville",
  "30.39,-81.42": "NS Mayport",
  "32.7,-117.2": "NAS North Island",

  "28.54,-81.38": "Orlando Sim Center",
  "41.35,-72.09": "NSB New London",
};

function getInstallName(node) {
  var key = locationKey(node);
  return INSTALL_NAMES[key] || node.sub || "Unknown Installation";
}

// Build installation groups from active view nodes
function buildInstallations(nodeIds) {
  var instMap = {}; // locationKey → { nodes:[], lat, lon, name }

  for (var i = 0; i < nodeIds.length; i++) {
    var id = nodeIds[i];
    var n = NODES[id];
    if (!n) continue;
    var key = locationKey(n);
    if (!instMap[key]) {
      instMap[key] = { nodes: [], lat: n.lat, lon: n.lon, name: getInstallName(n) };
    }
    instMap[key].nodes.push({ id: id, node: n });
  }

  return Object.values(instMap);
}

// Semantic zoom clustering — merge nearby installations at low zoom
const CLUSTER_RADIUS_BASE = 28;

function clusterInstallations(installations, zoomScale) {
  var threshold = CLUSTER_RADIUS_BASE / Math.max(zoomScale, 0.5);
  var projected = [];

  for (var i = 0; i < installations.length; i++) {
    var inst = installations[i];
    var p = projectToScreen([inst.lon, inst.lat]);
    if (!p) continue;
    projected.push({ inst: inst, x: p[0], y: p[1] });
  }

  // Sort: larger installations first (they anchor clusters)
  projected.sort(function (a, b) { return b.inst.nodes.length - a.inst.nodes.length; });

  var used = new Set();
  var clusters = [];

  for (var i = 0; i < projected.length; i++) {
    if (used.has(i)) continue;
    var cl = { members: [projected[i]], cx: projected[i].x, cy: projected[i].y };
    used.add(i);

    for (var j = i + 1; j < projected.length; j++) {
      if (used.has(j)) continue;
      var dx = projected[j].x - cl.cx;
      var dy = projected[j].y - cl.cy;
      if (Math.sqrt(dx * dx + dy * dy) < threshold) {
        cl.members.push(projected[j]);
        used.add(j);
        cl.cx = cl.members.reduce(function (s, m) { return s + m.x; }, 0) / cl.members.length;
        cl.cy = cl.members.reduce(function (s, m) { return s + m.y; }, 0) / cl.members.length;
      }
    }

    clusters.push(cl);
  }

  return clusters;
}

// LINE RENDERING — all in screen coordinates
// ═══════════════════════════════════════════════════════

// Screen-coordinate line path (used by overlay which is NOT zoom-transformed)
function makeLinePathScreen(fromNode, toNode) {
  var s1 = projectToScreen([fromNode.lon, fromNode.lat]);
  var s2 = projectToScreen([toNode.lon, toNode.lat]);
  if (!s1 || !s2) return null;

  var lonDiff = Math.abs(fromNode.lon - toNode.lon);

  if (currentProj === "ortho") {
    return makeGreatCircleScreen(fromNode, toNode);
  }

  // Natural Earth: check for problematic great circles
  if (lonDiff > 120) {
    return makeScreenCurve(s1, s2);
  }

  try {
    var interp = d3.geoInterpolate([fromNode.lon, fromNode.lat], [toNode.lon, toNode.lat]);
    var midGeo = interp(0.5);
    var maxLat = Math.max(fromNode.lat, toNode.lat);
    var minLat = Math.min(fromNode.lat, toNode.lat);
    if (midGeo[1] > maxLat + 15 || midGeo[1] < minLat - 15) {
      return makeScreenCurve(s1, s2);
    }
    return makeGreatCircleScreen(fromNode, toNode);
  } catch (e) {
    return makeScreenCurve(s1, s2);
  }
}

function makeGreatCircleScreen(fromNode, toNode) {
  try {
    var interp = d3.geoInterpolate([fromNode.lon, fromNode.lat], [toNode.lon, toNode.lat]);
    var nSteps = 60;
    var points = [];
    for (var i = 0; i <= nSteps; i++) {
      var coord = interp(i / nSteps);
      var px = projectToScreen(coord);
      if (px) points.push(px);
    }
    if (points.length < 2) return null;

    // On flat projection, detect wrapping jumps
    if (currentProj === "natural") {
      var filtered = [points[0]];
      for (var j = 1; j < points.length; j++) {
        var jumpDx = Math.abs(points[j][0] - points[j - 1][0]);
        if (jumpDx > W * 0.3) break;
        filtered.push(points[j]);
      }
      if (filtered.length < 2) {
        var s1 = projectToScreen([fromNode.lon, fromNode.lat]);
        var s2 = projectToScreen([toNode.lon, toNode.lat]);
        return (s1 && s2) ? makeScreenCurve(s1, s2) : null;
      }
      return "M" + filtered.map(function (p) { return p[0].toFixed(1) + "," + p[1].toFixed(1); }).join("L");
    }

    return "M" + points.map(function (p) { return p[0].toFixed(1) + "," + p[1].toFixed(1); }).join("L");
  } catch (e) {
    var s1 = projectToScreen([fromNode.lon, fromNode.lat]);
    var s2 = projectToScreen([toNode.lon, toNode.lat]);
    return (s1 && s2) ? makeScreenCurve(s1, s2) : null;
  }
}

function makeScreenCurve(p1, p2) {
  var mx = (p1[0] + p2[0]) / 2;
  var my = (p1[1] + p2[1]) / 2;
  var dx = p2[0] - p1[0];
  var dy = p2[1] - p1[1];
  var dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 1) return null;
  var bulge = Math.min(dist * 0.2, 80);
  var cx = mx;
  var cy = my - bulge;
  return "M" + p1[0].toFixed(1) + "," + p1[1].toFixed(1) +
         " Q" + cx.toFixed(1) + "," + cy.toFixed(1) +
         " " + p2[0].toFixed(1) + "," + p2[1].toFixed(1);
}

// ═══════════════════════════════════════════════════════
// RENDER — split into base (geo) and overlay (nodes/links)
// ═══════════════════════════════════════════════════════
let baseGroup, overlayGroup;

function renderBase() {
  svg.selectAll("g").remove();
  proj = projections[currentProj];
  pathGen = d3.geoPath(proj);

  // Base geography lives inside the zoom-transformed group
  baseGroup = svg.append("g").attr("class", "base");
  if (currentTransform !== d3.zoomIdentity) {
    baseGroup.attr("transform", currentTransform);
  }
  // Overlay (nodes/lines) renders in screen coordinates — NOT zoom-transformed
  overlayGroup = svg.append("g").attr("class", "overlay");

  // Sphere
  baseGroup.append("path")
    .datum({ type: "Sphere" })
    .attr("d", pathGen)
    .attr("fill", "#060a14")
    .attr("stroke", "#1e3458")
    .attr("stroke-width", 0.5);

  // Graticule
  baseGroup.append("path")
    .datum(d3.geoGraticule10())
    .attr("d", pathGen)
    .attr("class", "graticule");

  // Countries
  try {
    if (worldTopo) {
      const countries = topojson.feature(worldTopo, worldTopo.objects.countries);
      baseGroup.selectAll(".land")
        .data(countries.features)
        .join("path")
        .attr("class", "land")
        .attr("d", pathGen);
    }
  } catch (e) { console.warn("Country render:", e); }

  // US States
  try {
    if (usTopo) {
      const states = topojson.feature(usTopo, usTopo.objects.states);
      baseGroup.selectAll(".state-border")
        .data(states.features)
        .join("path")
        .attr("class", "state-border")
        .attr("d", pathGen);
    }
  } catch (e) { console.warn("State render:", e); }
}

// Project a [lon, lat] to screen coordinates accounting for zoom transform
function projectToScreen(lonlat) {
  var p = proj(lonlat);
  if (!p) return null;
  return [
    currentTransform.applyX(p[0]),
    currentTransform.applyY(p[1])
  ];
}

function renderNodesAndLinks() {
  if (!overlayGroup) {
    overlayGroup = svg.append("g").attr("class", "overlay");
  }
  overlayGroup.selectAll("*").remove();

  proj = projections[currentProj];
  pathGen = d3.geoPath(proj);

  var viewLinks = LINKS[currentView];
  var viewNodeIds = getViewNodes();

  // ── Build installation markers from active nodes ──
  var installations = buildInstallations(viewNodeIds);
  var clusters = clusterInstallations(installations, currentZoomScale);

  // Map each nodeId → the cluster its installation belongs to
  var nodeToCluster = {};
  for (var ci = 0; ci < clusters.length; ci++) {
    var cl = clusters[ci];
    for (var mi = 0; mi < cl.members.length; mi++) {
      var nodes = cl.members[mi].inst.nodes;
      for (var ni = 0; ni < nodes.length; ni++) {
        nodeToCluster[nodes[ni].id] = cl;
      }
    }
  }

  // ── Authority lines — route to installation locations ──
  var linkGroup = overlayGroup.append("g");
  var lineCount = 0;
  var drawnLines = new Set();

  var authTypes = ["opcon", "adcon", "ta", "lcsp", "aa"];
  for (var ai = 0; ai < authTypes.length; ai++) {
    var authType = authTypes[ai];
    if (!activeAuth.has(authType)) continue;
    var links = viewLinks[authType];
    if (!links || !links.length) continue;

    for (var li = 0; li < links.length; li++) {
      var fromId = links[li][0], toId = links[li][1];
      var fromNode = NODES[fromId], toNode = NODES[toId];
      if (!fromNode || !toNode) continue;

      var fromCl = nodeToCluster[fromId];
      var toCl = nodeToCluster[toId];

      // Skip lines between nodes at the same installation/cluster
      if (fromCl && toCl && fromCl === toCl) continue;

      // Dedup same-type lines between same locations
      var fci = fromCl ? clusters.indexOf(fromCl) : fromId;
      var tci = toCl ? clusters.indexOf(toCl) : toId;
      var clKey = authType + ":" + fci + ">" + tci;
      if (drawnLines.has(clKey)) continue;
      drawnLines.add(clKey);

      var pathD = makeLinePathScreen(fromNode, toNode);
      if (!pathD) continue;

      linkGroup.append("path")
        .attr("d", pathD)
        .attr("fill", "none")
        .attr("stroke", AUTH_COL[authType])
        .attr("stroke-width", AUTH_WIDTH[authType])
        .attr("stroke-dasharray", AUTH_DASH[authType] || null)
        .attr("opacity", 0.75)
        .attr("stroke-linecap", "round");
      lineCount++;
    }
  }

  // ── Installation markers ──
  var nodeGroup = overlayGroup.append("g");
  var nodeCount = 0;
  var instCount = 0;

  for (var ci = 0; ci < clusters.length; ci++) {
    var cl = clusters[ci];

    // Collect all nodes and installation names in this cluster
    var allNodes = [];
    var instNames = [];
    for (var mi = 0; mi < cl.members.length; mi++) {
      var inst = cl.members[mi].inst;
      allNodes = allNodes.concat(inst.nodes);
      if (instNames.indexOf(inst.name) < 0) instNames.push(inst.name);
    }

    var count = allNodes.length;
    var isSingleInst = cl.members.length === 1;
    var r = count > 8 ? 7.5 : count > 3 ? 6 : count > 1 ? 5 : 4;

    // Primary service color
    var primarySvc = "navy";
    if (allNodes.some(function (n) { return n.node.svc === "civ"; })) primarySvc = "civ";
    else if (allNodes.some(function (n) { return n.node.svc === "navy"; })) primarySvc = "navy";
    else primarySvc = "acq";
    var sc = SVC_COL[primarySvc] || SVC_COL.navy;

    // Build tooltip data via closure
    var tooltipData = { allNodes: allNodes, instNames: instNames, count: count,
      lat: cl.members[0].inst.lat, lon: cl.members[0].inst.lon };

    var ng = nodeGroup.append("g")
      .attr("transform", "translate(" + cl.cx.toFixed(1) + "," + cl.cy.toFixed(1) + ")")
      .style("cursor", "pointer")
      .datum(tooltipData)
      .on("mouseover", function (ev) {
        var d = d3.select(this).datum();
        showInstallationTooltip(ev, d);
        d3.select(this).select(".marker").attr("r", r * 1.4);
      })
      .on("mouseout", function () {
        hideTooltip();
        d3.select(this).select(".marker").attr("r", r);
      });

    // Glow
    ng.append("circle").attr("r", r * 3).attr("fill", sc.stroke).attr("opacity", 0.08);
    ng.append("circle").attr("r", r * 1.8).attr("fill", sc.stroke).attr("opacity", 0.12);

    // Main marker
    ng.append("circle").attr("class", "marker").attr("r", r)
      .attr("fill", sc.fill).attr("stroke", sc.stroke).attr("stroke-width", 2);

    // Count ring + badge for multi-command installations
    if (count > 1) {
      ng.append("circle").attr("r", r + 3).attr("fill", "none")
        .attr("stroke", "#c9a84c").attr("stroke-width", 0.5).attr("opacity", 0.5)
        .attr("stroke-dasharray", "2,2");
      ng.append("text").attr("class", "cluster-badge").attr("dy", 3)
        .attr("fill", "#c9a84c").text(count);
    }

    // Label
    var label;
    if (isSingleInst) {
      label = count === 1 ? allNodes[0].node.lbl : cl.members[0].inst.name;
    } else {
      label = instNames[0] + " area";
    }
    ng.append("text").attr("class", "node-label hub").attr("dy", -(r + 6)).text(label);

    nodeCount += count;
    instCount++;
  }

  document.getElementById("status").textContent =
    currentView + " | " + nodeCount + " commands at " + instCount + " locations | " +
    lineCount + " authority lines | zoom: " + currentZoomScale.toFixed(1) + "x";
}

function getViewNodes() {
  var s = new Set();
  var vl = LINKS[currentView];
  for (var key in vl) {
    if (!vl.hasOwnProperty(key)) continue;
    var arr = vl[key];
    for (var i = 0; i < arr.length; i++) { s.add(arr[i][0]); s.add(arr[i][1]); }
  }
  return Array.from(s);
}

// ═══════════════════════════════════════════════════════
// TOOLTIPS — installation-based
// ═══════════════════════════════════════════════════════
const tt = document.getElementById("tooltip");

function showInstallationTooltip(ev, data) {
  var locStr = data.lat.toFixed(2) + '°N, ' + Math.abs(data.lon).toFixed(2) + '°' + (data.lon < 0 ? 'W' : 'E');

  // Group nodes by service type for organized display
  var grouped = {};
  for (var i = 0; i < data.allNodes.length; i++) {
    var n = data.allNodes[i];
    var svc = n.node.svc;
    if (!grouped[svc]) grouped[svc] = [];
    grouped[svc].push(n);
  }

  var svcLabels = { civ: "Civilian Leadership", navy: "Naval Commands", acq: "Acquisition Programs" };
  var html = '<div class="tt-lbl">' + data.instNames.join(" / ") + '</div>';
  html += '<div class="tt-loc" style="margin-bottom:6px">' + data.count + ' commands — ' + locStr + '</div>';

  var svcOrder = ["civ", "navy", "acq"];
  for (var si = 0; si < svcOrder.length; si++) {
    var svc = svcOrder[si];
    if (!grouped[svc]) continue;
    var svcCol = (SVC_COL[svc] || SVC_COL.navy).stroke;
    html += '<div style="color:' + svcCol + ';font-size:9px;font-weight:600;margin:5px 0 2px;text-transform:uppercase;letter-spacing:1px">' + (svcLabels[svc] || svc) + '</div>';
    for (var ni = 0; ni < grouped[svc].length; ni++) {
      var node = grouped[svc][ni];
      html += '<div style="margin:1px 0;padding-left:10px;border-left:2px solid ' + svcCol + '">' +
        '<span style="color:#c9a84c;font-weight:600">' + node.node.lbl + '</span>' +
        '<span style="color:#5a7ea0"> — ' + node.node.sub + '</span></div>';
    }
  }

  tt.innerHTML = html;
  positionTooltip(ev);
}

function positionTooltip(ev) {
  tt.style.display = "block";
  var pad = 14;
  tt.style.left = (ev.clientX + pad) + "px";
  tt.style.top = (ev.clientY - 10) + "px";
  var rect = tt.getBoundingClientRect();
  if (rect.right > W - 10) tt.style.left = (ev.clientX - rect.width - pad) + "px";
  if (rect.bottom > H - 10) tt.style.top = (ev.clientY - rect.height - pad) + "px";
}

function hideTooltip() { tt.style.display = "none"; }

// ═══════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════
document.getElementById("sel-view").addEventListener("change", function () {
  currentView = this.value;
  renderNodesAndLinks();
});

function setProj(p) {
  currentProj = p;
  proj = projections[p];
  pathGen = d3.geoPath(proj);
  document.querySelectorAll('[id^="btn-proj-"]').forEach(b => b.classList.remove("active"));
  document.getElementById("btn-proj-" + p).classList.add("active");
  // Reset zoom
  currentTransform = d3.zoomIdentity;
  currentZoomScale = 1;
  svg.call(zoomBehavior.transform, d3.zoomIdentity);
  renderBase();
  renderNodesAndLinks();
}

function toggleAuth(a) {
  var btn = document.getElementById("btn-auth-" + a);
  if (activeAuth.has(a)) { activeAuth.delete(a); btn.classList.remove("active"); }
  else { activeAuth.add(a); btn.classList.add("active"); }
  renderNodesAndLinks();
}
</script>
</body>
